name: Autotools build
# Run autotools build on Linux and MacOS

on:
  # push:
    # branches: [ "master" ]
  # pull_request:
    # branches: [ "master" ]
  workflow_dispatch:

jobs:
  basictests:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: '🐧 ubuntu-latest-gcc-autotools', os:  ubuntu-latest, cxx: g++ }
          - { name: '🍏 macos-latest-clang-autotools', os: macos-latest, cxx: clang++  }
          - { name: '🍎 macos-latest-gcc-autotools', os: macos-latest, cxx: g++  }

    steps:
    - name: Checkout Source
      uses: actions/checkout@v7

    - name: '⬇️ Install dependencies on Linux'
      run: |
           sudo apt-get update
           sudo apt-get install ${{ matrix.config.cxx }} -y
           sudo apt-get install autoconf-archive -y
           sudo apt-get install pkg-config -y
           sudo apt-get install libicu-dev libcurl4-openssl-dev -y
           sudo apt-get install liblzma-dev lzma xz-utils libbz2-dev -y
           sudo apt-get install libxapian-dev libclucene-dev -y
           g++ --version
      if: runner.os == 'Linux'

    - name: '⬇️ Install dependencies on macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      run: |
           brew install autoconf automake libtool xapian bzip2
           brew install autoconf-archive
           brew reinstall xz
           brew reinstall icu4c
           if ! brew list curl &>/dev/null; then
             brew install curl
           fi
           ln -s $(which glibtoolize) /usr/local/bin/libtoolize
           clang++ --version
           g++ --version
      if: runner.os == 'macOS'

    - name: '🔧 Configure'
      run: |
           ./autogen.sh
           if [ "${{ runner.os }}" = "macOS" ]; then
              BREW_PREFIX="$(brew --prefix)"
              ICU_PREFIX="$(brew --prefix icu4c)"
              CLUCENE_PREFIX="$(brew --prefix clucene 2>/dev/null || echo "${BREW_PREFIX}")"
              export CPPFLAGS="-I${ICU_PREFIX}/include -I${CLUCENE_PREFIX}/include -I${BREW_PREFIX}/include ${CPPFLAGS}"
              export LDFLAGS="-L${ICU_PREFIX}/lib -L${CLUCENE_PREFIX}/lib -L${BREW_PREFIX}/lib ${LDFLAGS}"
              export PKG_CONFIG_PATH="${ICU_PREFIX}/lib/pkgconfig:${CLUCENE_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
           fi
           ./configure \
             --with-cxx11regex --with-cxx11time \
             --with-bzip2 --with-xz \
             --with-clucene="${CLUCENE_PREFIX:-/usr}" \
             --enable-tests \
             CXX=${{ matrix.config.cxx }}
    - name: '🚧 Build and install'
      run: |
           CXX=${{matrix.config.cxx}} make # -j 4
           sudo make install
           sudo make install_config

    - name: '🔄 Register installed lib'
      run: |
           sudo ldconfig
      if: runner.os == 'Linux'

    - name: '✔️ Tests'
      run: |
           sudo installmgr --allow-internet-access-and-risk-tracing-and-jail-or-martyrdom -sc -r CrossWire -ri CrossWire KJV
           diatheke -b KJV -f plain -k IThes 5:16

    - name: '💔 Make check'
      run: make check

    - name: '🛡️ Make distcheck'
      run: |
           if [ "${{ runner.os }}" = "macOS" ]; then
              BREW_PREFIX="$(brew --prefix)"
              ICU_PREFIX="$(brew --prefix icu4c)"
              CLUCENE_PREFIX="$(brew --prefix clucene 2>/dev/null || echo "${BREW_PREFIX}")"
              export CPPFLAGS="-I${ICU_PREFIX}/include -I${CLUCENE_PREFIX}/include -I${BREW_PREFIX}/include${CPPFLAGS:+ ${CPPFLAGS}}"
              export LDFLAGS="-L${ICU_PREFIX}/lib -L${CLUCENE_PREFIX}/lib -L${BREW_PREFIX}/lib${LDFLAGS:+ ${LDFLAGS}}"
              export PKG_CONFIG_PATH="${ICU_PREFIX}/lib/pkgconfig:${CLUCENE_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
           fi
           make distcheck
